<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROFITMAXX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; }
  
  /* Password Gate */
  #gate { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
  #gate h1 { font-size: 2rem; color: #00ff88; }
  #gate input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px 20px; font-size: 1.2rem; font-family: inherit; text-align: center; border-radius: 4px; }
  #gate input:focus { outline: none; border-color: #00ff88; }
  #gate .error { color: #ff4444; font-size: 0.8rem; min-height: 1.2em; }
  
  /* Dashboard */
  #dashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
  .header h1 { color: #00ff88; font-size: 1.8rem; }
  .header .updated { color: #666; font-size: 0.8rem; }
  
  .bots { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
  @media (max-width: 768px) { .bots { grid-template-columns: 1fr; } }
  
  .bot-card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 20px; }
  .bot-card h2 { font-size: 1.2rem; margin-bottom: 5px; }
  .bot-card .strategy { color: #888; font-size: 0.75rem; margin-bottom: 15px; }
  .bot-card .status { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.7rem; text-transform: uppercase; }
  .status-paper { background: #332800; color: #ffaa00; }
  .status-live { background: #003322; color: #00ff88; }
  
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
  .stat { text-align: center; }
  .stat .val { font-size: 1.4rem; font-weight: bold; }
  .stat .label { font-size: 0.65rem; color: #666; text-transform: uppercase; }
  .green { color: #00ff88; }
  .red { color: #ff4444; }
  .neutral { color: #888; }
  
  .pnl-big { text-align: center; margin: 20px 0 10px; }
  .pnl-big .val { font-size: 2.2rem; font-weight: bold; }
  .pnl-big .label { font-size: 0.7rem; color: #666; }
  
  .trades-section { background: #111; border: 1px solid #222; border-radius: 8px; padding: 20px; margin-top: 20px; }
  .trades-section h2 { margin-bottom: 15px; font-size: 1rem; color: #00ff88; }
  
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th { text-align: left; color: #666; padding: 8px 6px; border-bottom: 1px solid #222; font-size: 0.7rem; text-transform: uppercase; }
  td { padding: 8px 6px; border-bottom: 1px solid #1a1a1a; }
  
  .chart-container { background: #111; border: 1px solid #222; border-radius: 8px; padding: 20px; margin-top: 20px; }
  .chart-container h2 { margin-bottom: 15px; font-size: 1rem; color: #00ff88; }
  
  .no-data { text-align: center; color: #444; padding: 40px; font-size: 0.9rem; }
</style>
</head>
<body>

<div id="gate">
  <h1>🦞 PROFITMAXX 📈</h1>
  <input type="password" id="pwd" placeholder="password" autofocus>
  <div class="error" id="err"></div>
</div>

<div id="dashboard">
  <div class="header">
    <h1>🦞 PROFITMAXX 📈</h1>
    <div>
      <div class="updated" id="lastUpdated">loading...</div>
      <div class="updated">kalshi paper trading</div>
    </div>
  </div>
  
  <div class="bots" id="botCards"></div>
  
  <div class="chart-container">
    <h2>Cumulative P&L</h2>
    <canvas id="pnlChart" height="80"></canvas>
    <div class="no-data" id="chartNoData">no trades yet — bots are warming up 🔥</div>
  </div>
  
  <div class="trades-section">
    <h2>Recent Trades</h2>
    <div id="tradesTable">
      <div class="no-data">no trades yet</div>
    </div>
  </div>
</div>

<script>
const PASS = 'FEEL';

document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (this.value === PASS) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    } else {
      document.getElementById('err').textContent = 'nah';
      this.value = '';
    }
  }
});

async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    const data = await res.json();
    render(data);
  } catch(e) {
    console.error(e);
  }
}

function render(data) {
  document.getElementById('lastUpdated').textContent = data.lastUpdated ? 'updated: ' + data.lastUpdated : 'no data yet';
  
  const container = document.getElementById('botCards');
  container.innerHTML = '';
  
  for (const [id, bot] of Object.entries(data.bots)) {
    const pnlClass = bot.totalPnL > 0 ? 'green' : bot.totalPnL < 0 ? 'red' : 'neutral';
    const statusClass = bot.status === 'live' ? 'status-live' : 'status-paper';
    
    container.innerHTML += `
      <div class="bot-card">
        <h2>${bot.name} <span class="status ${statusClass}">${bot.status}</span></h2>
        <div class="strategy">${bot.strategy}</div>
        <div class="pnl-big">
          <div class="val ${pnlClass}">${bot.totalPnL >= 0 ? '+' : ''}${(bot.totalPnL / 100).toFixed(2)}</div>
          <div class="label">total p&l ($)</div>
        </div>
        <div class="stats">
          <div class="stat"><div class="val neutral">${bot.totalTrades}</div><div class="label">trades</div></div>
          <div class="stat"><div class="val ${bot.winRate >= 55 ? 'green' : bot.winRate >= 45 ? 'neutral' : 'red'}">${bot.winRate}%</div><div class="label">win rate</div></div>
          <div class="stat"><div class="val red">${(bot.maxDrawdown / 100).toFixed(2)}</div><div class="label">max dd ($)</div></div>
        </div>
        <div class="stats" style="margin-top:8px">
          <div class="stat"><div class="val green">+${(bot.avgWin / 100).toFixed(2)}</div><div class="label">avg win</div></div>
          <div class="stat"><div class="val red">${(bot.avgLoss / 100).toFixed(2)}</div><div class="label">avg loss</div></div>
          <div class="stat"><div class="val neutral">${bot.wins}/${bot.losses}</div><div class="label">w/l</div></div>
        </div>
      </div>`;
  }
  
  // trades table
  const allTrades = [];
  for (const [id, bot] of Object.entries(data.bots)) {
    if (bot.trades) {
      bot.trades.forEach(t => allTrades.push({...t, bot: bot.name}));
    }
  }
  allTrades.sort((a, b) => new Date(b.time) - new Date(a.time));
  
  const tradesDiv = document.getElementById('tradesTable');
  if (allTrades.length === 0) {
    tradesDiv.innerHTML = '<div class="no-data">no trades yet</div>';
    document.getElementById('chartNoData').style.display = 'block';
    return;
  }
  
  document.getElementById('chartNoData').style.display = 'none';
  
  let html = '<table><tr><th>time</th><th>bot</th><th>market</th><th>side</th><th>entry</th><th>exit</th><th>p&l</th></tr>';
  allTrades.slice(0, 50).forEach(t => {
    const pnlClass = t.pnl > 0 ? 'green' : t.pnl < 0 ? 'red' : 'neutral';
    html += `<tr><td>${t.time || ''}</td><td>${t.bot}</td><td>${t.market || ''}</td><td>${t.side || ''}</td><td>${t.entry || ''}¢</td><td>${t.exit || ''}¢</td><td class="${pnlClass}">${t.pnl > 0 ? '+' : ''}${(t.pnl / 100).toFixed(2)}</td></tr>`;
  });
  html += '</table>';
  tradesDiv.innerHTML = html;
}
</script>
</body>
</html>
